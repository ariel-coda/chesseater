<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChessEater — Analyse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "ce-green": "#81b64c",
            "ce-green-dark": "#6a9a3a",
            "ce-100": "#f8f9fa",
            "ce-200": "#e9ecef",
            "ce-300": "#dee2e6",
            "ce-400": "#adb5bd",
            "ce-500": "#6c757d",
            "ce-600": "#495057",
            "ce-700": "#343a40",
          },
          fontFamily: {
            sans: ['"Inter"', "sans-serif"],
            mono: ['"JetBrains Mono"', "monospace"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.base.css">
  <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.brown.css">
  <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.cburnett.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../style/analyse.css" />
</head>

<body class="bg-ce-100 text-ce-700 h-screen flex flex-col overflow-hidden font-sans">
  <!-- TOP NAVBAR -->
  <header class="bg-white border-b border-ce-300 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <a href="../index.html" class="flex items-center gap-2 hover:opacity-70 transition">
        <i data-lucide="arrow-left" class="w-5 h-5 text-ce-600"></i>
        <span class="text-sm font-medium text-ce-600">Retour</span>
      </a>
      
      <div>
        <h1 class="text-lg font-bold text-ce-700">Analyse</h1>
        <p id="gameTitle" class="text-xs text-ce-500">Chargement...</p>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <button class="p-2 text-ce-600 hover:text-ce-700 hover:bg-ce-100 rounded-lg transition">
        <i data-lucide="settings" class="w-5 h-5"></i>
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="flex-1 overflow-hidden flex">
    <!-- LEFT: BOARD + INFO -->
    <div class="flex-1 flex flex-col border-r border-ce-300 overflow-hidden">
      <!-- Board Container -->
      <div class="flex-1 flex items-center justify-center p-6 bg-ce-100 overflow-auto">
        <div id="boardContainer" class="flex gap-6">
          <!-- Evaluation bar -->
          <div class="eval-bar-track hidden sm:flex"></div>
          
          <!-- Chessground board -->
          <div id="board" class="bg-white rounded-lg shadow-md" style="width: 500px; height: 500px;"></div>
        </div>
      </div>

      <!-- Move List -->
      <div class="h-32 bg-white border-t border-ce-300 overflow-y-auto p-4">
        <div id="moveList" class="flex flex-wrap gap-2 font-mono text-sm">
          <!-- Moves injected by JS -->
        </div>
      </div>
    </div>

    <!-- RIGHT: ANALYSIS PANEL -->
    <div class="w-96 bg-white border-l border-ce-300 flex flex-col overflow-hidden">
      <!-- Tabs -->
      <div class="flex border-b border-ce-300">
        <button class="tab-btn flex-1 py-3 text-sm font-medium text-ce-700 border-b-2 border-ce-green" data-tab="analysis">
          Analyse
        </button>
        <button class="tab-btn flex-1 py-3 text-sm font-medium text-ce-500 border-b-2 border-transparent hover:text-ce-700" data-tab="info">
          Info
        </button>
      </div>

      <!-- Tab content -->
      <div class="flex-1 overflow-y-auto">
        <!-- Analysis tab -->
        <div id="analysisTab" class="p-4 space-y-3">
          <div id="analysisList">
            <!-- Analysis comments injected by JS -->
          </div>
        </div>

        <!-- Info tab -->
        <div id="infoTab" class="p-4 hidden">
          <div class="space-y-4">
            <div>
              <p class="text-xs font-semibold text-ce-500 uppercase">Résultat</p>
              <p id="resultInfo" class="text-lg font-bold text-ce-700">—</p>
            </div>
            <div>
              <p class="text-xs font-semibold text-ce-500 uppercase">Format</p>
              <p id="formatInfo" class="text-lg font-bold text-ce-700">—</p>
            </div>
            <div>
              <p class="text-xs font-semibold text-ce-500 uppercase">Coups</p>
              <p id="movesInfo" class="text-lg font-bold text-ce-700">—</p>
            </div>
            <div>
              <p class="text-xs font-semibold text-ce-500 uppercase">Précision</p>
              <p id="accuracyInfo" class="text-lg font-bold text-ce-700">—</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/chess.js@1.0.0-beta.8/dist/chess.js"></script>
  <script src="https://unpkg.com/chessground@10.6.1/dist/chessground.umd.js"></script>
  <script src="https://unpkg.com/stockfish@12.0.0/stockfish.js"></script>
  <script src="../script/analyse.js"></script>
</body>
</html>
