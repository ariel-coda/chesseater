<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChessEater - Analyse d'échecs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "ce-green": "#81b64c",
              "ce-green-dark": "#6a9a3a",
              "ce-100": "#f8f9fa",
              "ce-200": "#e9ecef",
              "ce-300": "#dee2e6",
              "ce-400": "#adb5bd",
              "ce-500": "#6c757d",
              "ce-600": "#495057",
              "ce-700": "#343a40",
            },
            fontFamily: {
              sans: ['"Inter"', "sans-serif"],
              mono: ['"JetBrains Mono"', "monospace"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="style/style.css" />
  </head>

  <body class="bg-ce-100 text-ce-700 h-screen flex flex-col overflow-hidden font-sans">
    <!-- TOP NAVBAR -->
    <header class="bg-white border-b border-ce-300 px-6 py-4 flex items-center justify-between">
      <!-- Left: Logo + Title -->
      <div class="flex items-center gap-3">
        <img src="./assets/icons/knight-3d.jpg" alt="ChessEater" class="w-8 h-8 rounded" />
        <div>
          <h1 class="text-xl font-bold text-ce-700">ChessEater</h1>
          <p class="text-xs text-ce-500">Analyse d'échecs alimentée par l'IA</p>
        </div>
      </div>

      <!-- Right: Actions -->
      <div class="flex items-center gap-3">
        <button class="p-2 text-ce-600 hover:text-ce-700 hover:bg-ce-100 rounded-lg transition">
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
        <button class="p-2 text-ce-600 hover:text-ce-700 hover:bg-ce-100 rounded-lg transition">
          <i data-lucide="help-circle" class="w-5 h-5"></i>
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-auto">
      <div class="max-w-7xl mx-auto px-6 py-12">
        <!-- Hero Section -->
        <div class="mb-12">
          <h2 class="text-3xl font-bold text-ce-700 mb-2">Analysez vos parties</h2>
          <p class="text-ce-500">Importez vos parties depuis Chess.com ou Lichess pour une analyse détaillée</p>
        </div>

        <!-- Import Section -->
        <div class="bg-white rounded-lg border border-ce-300 p-8 mb-12">
          <div class="flex items-end gap-4">
            <!-- Username input -->
            <div class="flex-1 max-w-xs">
              <label class="block text-sm font-medium text-ce-700 mb-2">Nom d'utilisateur</label>
              <input
                id="usernameInput"
                type="text"
                placeholder="Entrez votre pseudo"
                class="w-full px-4 py-2 border border-ce-300 rounded-lg text-ce-700 placeholder-ce-400 focus:ring-2 focus:ring-ce-green focus:border-transparent transition"
              />
            </div>

            <!-- Platform tabs -->
            <div class="flex gap-2">
              <button
                onclick="setSource('chesscom')"
                id="tab-chesscom"
                class="source-tab px-4 py-2 border border-ce-300 rounded-lg text-sm font-medium text-ce-600 hover:bg-ce-100 transition active:bg-ce-green active:text-white active:border-ce-green"
              >
                <img src="./assets/logo/chess.com.png" alt="" class="w-4 h-4 inline mr-2" />
                Chess.com
              </button>
              <button
                onclick="setSource('lichess')"
                id="tab-lichess"
                class="source-tab px-4 py-2 border border-ce-300 rounded-lg text-sm font-medium text-ce-600 hover:bg-ce-100 transition"
              >
                <img src="./assets/logo/lichess.png" alt="" class="w-4 h-4 inline mr-2" />
                Lichess
              </button>
            </div>

            <!-- Import button -->
            <button
              onclick="startImport()"
              id="importBtn"
              class="px-6 py-2 bg-ce-green hover:bg-ce-green-dark text-white font-semibold rounded-lg transition flex items-center gap-2"
            >
              <i data-lucide="download" class="w-4 h-4"></i>
              Charger
            </button>
          </div>
        </div>

        <!-- Games Grid -->
        <div>
          <h3 class="text-lg font-semibold text-ce-700 mb-4">Vos parties</h3>
          
          <!-- Empty state -->
          <div
            id="emptyState"
            class="text-center py-12 bg-white rounded-lg border border-ce-300"
          >
            <i data-lucide="chess" class="w-12 h-12 text-ce-400 mx-auto mb-4"></i>
            <p class="text-ce-600 font-medium">Aucune partie chargée</p>
            <p class="text-ce-500 text-sm mt-1">Importez vos parties pour commencer l'analyse</p>
          </div>

          <!-- Loading state -->
          <div
            id="loadingState"
            class="text-center py-12 bg-white rounded-lg border border-ce-300 hidden"
          >
            <div class="w-10 h-10 rounded-full border-4 border-ce-300 border-t-ce-green spinner mx-auto mb-4"></div>
            <p class="text-ce-600 font-medium">Chargement des parties...</p>
          </div>

          <!-- Games list -->
          <div id="gamesList" class="grid gap-4 hidden">
            <!-- Cards injected by JS -->
          </div>
        </div>

        <!-- Analyze button -->
        <div id="analyzeBar" class="hidden mt-8 flex justify-center">
          <button
            onclick="analyzeSelected()"
            class="px-8 py-3 bg-ce-green hover:bg-ce-green-dark text-white font-semibold rounded-lg transition flex items-center gap-2"
          >
            <i data-lucide="zap" class="w-5 h-5"></i>
            Analyser la partie sélectionnée
          </button>
        </div>
      </div>
    </main>

    <script>
      lucide.createIcons();

      let currentSource = "chesscom";
      let games = [];
      let selectedGameId = null;

      function setSource(src) {
        currentSource = src;
        ["chesscom", "lichess"].forEach((s) => {
          document.getElementById("tab-" + s).classList.remove("active");
        });
        document.getElementById("tab-" + src).classList.add("active");
      }

      async function startImport() {
        const username = document.getElementById("usernameInput").value.trim();

        if (!username) {
          alert("Veuillez entrer votre nom d'utilisateur");
          return;
        }

        document.getElementById("emptyState").classList.add("hidden");
        document.getElementById("gamesList").classList.add("hidden");
        document.getElementById("loadingState").classList.remove("hidden");
        document.getElementById("analyzeBar").classList.add("hidden");

        try {
          if (currentSource === "chesscom") {
            const response = await fetch(
              `/api/games/chesscom/all?username=${username}`
            );

            if (!response.ok) throw new Error("Utilisateur introuvable sur Chess.com");

            const data = await response.json();

            games = data.games.map((g, i) => {
              const isWhite = g.white.username.toLowerCase() === username.toLowerCase();
              const me = isWhite ? g.white : g.black;
              const opponent = isWhite ? g.black : g.white;

              let result = "draw";
              if (me.result === "win") result = "win";
              if (["resigned", "checkmated", "timeout", "abandoned"].includes(me.result))
                result = "loss";

              const date = new Date(g.end_time * 1000);
              const diffDays = Math.floor((new Date() - date) / (1000 * 60 * 60 * 24));
              const dateLabel = diffDays === 0 ? "Aujourd'hui" : diffDays === 1 ? "Hier" : `Il y a ${diffDays}j`;

              const moves = g.pgn ? g.pgn.split(/\d+\./).length - 1 : 0;

              return {
                id: i,
                result,
                opponent: opponent.username,
                rating: opponent.rating,
                format: g.time_class.charAt(0).toUpperCase() + g.time_class.slice(1) + " " + g.time_control,
                date: dateLabel,
                accuracy: me.accuracy ?? null,
                platform: "chesscom",
                moves,
                pgn: g.pgn,
              };
            });

            renderGames(games.reverse());
          } else if (currentSource === "lichess") {
            const response = await fetch(
              `/api/games/lichess/all?username=${username}`
            );

            if (!response.ok) throw new Error("Utilisateur introuvable sur Lichess");

            const data = await response.json();

            games = data.games.map((g, i) => {
              const isWhite = g.players.white.user?.name.toLowerCase() === username.toLowerCase();
              const me = isWhite ? g.players.white : g.players.black;
              const opponent = isWhite ? g.players.black : g.players.white;

              let result = "draw";
              if (g.winner === (isWhite ? "white" : "black")) result = "win";
              if (g.winner === (isWhite ? "black" : "white")) result = "loss";

              const date = new Date(g.createdAt);
              const diffDays = Math.floor((new Date() - date) / (1000 * 60 * 60 * 24));
              const dateLabel = diffDays === 0 ? "Aujourd'hui" : diffDays === 1 ? "Hier" : `Il y a ${diffDays}j`;

              const moves = g.moves ? g.moves.split(" ").length : 0;

              return {
                id: i,
                result,
                opponent: opponent.user?.name ?? "Anonyme",
                rating: opponent.rating ?? "?",
                format: g.speed.charAt(0).toUpperCase() + g.speed.slice(1),
                date: dateLabel,
                accuracy: me.analysis?.accuracy ?? null,
                platform: "lichess",
                moves,
                pgn: g.pgn ?? null,
              };
            });

            renderGames(games);
          }
        } catch (error) {
          document.getElementById("loadingState").classList.add("hidden");
          document.getElementById("emptyState").classList.remove("hidden");
          alert("Erreur : " + error.message);
        }
      }

      function renderGames(gamesList) {
        const container = document.getElementById("gamesList");
        container.innerHTML = "";

        gamesList.forEach((g) => {
          const card = document.createElement("div");
          card.className = "game-card bg-white rounded-lg border border-ce-300 p-5 hover:border-ce-green hover:shadow-md transition cursor-pointer";
          card.dataset.id = g.id;

          const resultEmoji = g.result === "win" ? "✓" : g.result === "loss" ? "✗" : "=";
          const resultColor = g.result === "win" ? "text-ce-green" : g.result === "loss" ? "text-red-600" : "text-ce-400";

          card.innerHTML = `
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-2xl font-bold ${resultColor}">${resultEmoji}</span>
                  <div>
                    <h4 class="font-semibold text-ce-700">${g.opponent}</h4>
                    <p class="text-xs text-ce-500">${g.rating} Elo</p>
                  </div>
                </div>
                <p class="text-sm text-ce-600 font-mono">${g.format}</p>
              </div>
              <div class="text-right">
                <p class="text-xs text-ce-500">${g.date}</p>
                <p class="text-sm font-medium text-ce-700">${g.moves} coups</p>
                ${g.accuracy ? `<p class="text-xs text-ce-green font-semibold">${g.accuracy}%</p>` : ""}
              </div>
            </div>
          `;

          card.addEventListener("click", () => selectGame(g.id, card));
          container.appendChild(card);
        });

        document.getElementById("gamesList").classList.remove("hidden");
        document.getElementById("loadingState").classList.add("hidden");
        lucide.createIcons();
      }

      function selectGame(id, element) {
        document.querySelectorAll(".game-card").forEach((card) => {
          card.classList.remove("selected");
        });
        element.classList.add("selected");
        selectedGameId = id;
        document.getElementById("analyzeBar").classList.remove("hidden");
      }

      function analyzeSelected() {
        if (selectedGameId === null) return;
        const game = games.find((g) => g.id === selectedGameId);
        if (game) {
          sessionStorage.setItem("gameToAnalyze", JSON.stringify(game));
          window.location.href = "./pages/analyse.html";
        }
      }

      // Initialize
      setSource("chesscom");
    </script>
  </body>
</html>
